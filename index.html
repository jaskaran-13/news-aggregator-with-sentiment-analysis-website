<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>News Aggregator</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <h1>News Aggregator with Sentiment Analysis</h1>
        </header>
        <main>
            <!-- Category Filter -->
            <section id="category-section">
                <label for="category">Choose a category:</label>
                <select id="category" name="category">
                    <option value="general">General</option>
                    <option value="business">Business</option>
                    <option value="technology">Technology</option>
                    <option value="sports">Sports</option>
                    <option value="health">Health</option>
                    <option value="entertainment">Entertainment</option>
                </select>
                <button id="filter-button">Filter News</button>
            </section>
            
            <section id="news-section">
                <!-- News articles will appear here -->
            </section>
            <section id="sentiment-section">
                <h2>Sentiment Analysis</h2>
                <p id="sentiment-result">Sentiment will be displayed here.</p>
            </section>
        </main>
        <footer>
            <p>Built by the News Aggregator Team</p>
        </footer>
        <script src="app.js"></script>
    </body>
</html>
